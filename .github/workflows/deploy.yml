#  Oromo — Déploiement Direct GitHub Actions (Sans branche)
#  Auteur : Sébastien Godet
# ══════════════════════════════════════════════════════════════════

name: 🚀 Deploy Oromo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump SW cache version
        run: |
          # Remplacez "taphadmeuh-v" ci-dessous par le préfixe de cache de votre app Oromo si nécessaire
          CURRENT=$(grep -oE "taphadmeuh-v[0-9]+" sw.js | head -n 1 | grep -oE "[0-9]+")
          NEXT=$((CURRENT + 1))
          TODAY=$(date +'%Y-%m-%d')
          echo "Version Oromo en cours : v${NEXT}"
          sed -i "s|var CACHE_NAME = 'taphadmeuh-v${CURRENT}'.*;|var CACHE_NAME = 'taphadmeuh-v${NEXT}'; /* v${NEXT} — déployé le ${TODAY} */|g" sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
