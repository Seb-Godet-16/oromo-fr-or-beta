name: 🚀 Deploy Oromo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject build number into sw.js cache version
        run: |
          # Replace the GITHUB_RUN_NUMBER placeholder in sw.js with the actual
          # build number so each deploy gets a unique cache name, forcing
          # browsers to fetch fresh assets without any manual cache busting.
          sed -i "s/GITHUB_RUN_NUMBER/${{ github.run_number }}/g" sw.js

      - name: Package site files for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
