<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  Language App 🇫🇷🇪🇹  —  index.html                           ║
  ║  Auteur   : Sébastien Godet                                     ║
  ║  Assisté  : Claude Sonnet 4.6 · Gemini 3.5 Flash               ║
  ║  Version  : Juin 2026                                           ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  RÔLE DE CE FICHIER                                             ║
  ║  Ce fichier est le point d'entrée unique de l'application.      ║
  ║  Il déclare la structure HTML des 4 "écrans" (screens) et de   ║
  ║  la modale. Aucune logique métier n'y est présente : tout le   ║
  ║  comportement est délégué à js/app.js et js/data-fr/or.js.     ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  ARCHITECTURE GLOBALE DU PROJET                                 ║
  ║  ├── index.html   → Structure HTML (ce fichier)                ║
  ║  ├── css/                                                       ║
  ║  │   └── style.css  → Mise en forme visuelle                   ║
  ║  └── js/                                                        ║
  ║      ├── data-fr.js → Contenu linguistique — mode Français      ║
  ║      ├── data-or.js → Contenu linguistique — mode Oromo        ║
  ║      └── app.js     → Logique applicative (navigation, score…) ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  NAVIGATION ENTRE ÉCRANS                                        ║
  ║  La visibilité des écrans est contrôlée par la classe CSS       ║
  ║  "active" (gérée dans app.js via showScreen()).                 ║
  ║  Ordre du parcours utilisateur :                                ║
  ║    [0] app-launcher → [1] home → [2] sections → [3] lesson     ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <!-- 
    viewport : Autorise le zoom manuel jusqu'à 5.0 pour l'accessibilité (WCAG),
    tout en préservant l'échelle initiale (1.0) pour un affichage stable sur mobile.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Taphad'Meuh 🐄</title>

  <!-- ── PWA : manifest + couleur de thème ── -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#002395" id="meta-theme-color">
  <meta name="description"
        content="Taphad'Meuh — Application bilingue Français ↔ Afaan Oromoo. Apprenez hors-ligne, sur mobile et desktop.">

  <!-- ── iOS PWA : icône et couleur de la barre de statut ── -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Taphad'Meuh">

  <!-- ── Open Graph (partage réseaux sociaux) ── -->
  <meta property="og:title"       content="Taphad'Meuh 🐄 — Français ↔ Afaan Oromoo">
  <meta property="og:description" content="Application bilingue d'apprentissage Français / Oromo. Gratuite et hors-ligne.">
  <meta property="og:image"       content="icons/icon-512x512.png">
  <meta property="og:type"        content="website">

  <!-- Feuille de styles unique — voir css/style.css pour les détails -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!--
  ┌──────────────────────────────────────────────────────────────────┐
  │  .app — Conteneur racine                                         │
  │  Sert de point d'ancrage pour le positionnement CSS de tous      │
  │  les écrans. Chaque écran enfant direct est une .screen.         │
  └──────────────────────────────────────────────────────────────────┘
-->
<div class="app">


  <!-- ════════════════════════════════════════════════════════════════
       ÉCRAN 0 — LANCEUR D'APPLICATION  (#app-launcher)
       ────────────────────────────────────────────────────────────────
       Premier écran affiché au lancement (classe "active" par défaut).
       Permet à l'utilisateur de choisir sa langue cible :
         • Apprendre le Français  → appelle initApp('learn_french')
         • Apprendre l'Oromo     → appelle initApp('learn_oromo')
       initApp() est défini dans js/app.js ; il initialise le contexte
       linguistique et affiche l'écran #home.
       ════════════════════════════════════════════════════════════════ -->
  <div id="app-launcher" class="screen active">

    <!-- Couche d'arrière-plan décorative (gérée par style.css) -->
    <div class="launcher-bg"></div>

    <!-- Contenu centré du lanceur -->
    <div class="launcher-inner">
      <!--
        Logo principal — image landscape (1408×768) du projet.
        • width:100%  → s'adapte à la largeur du .launcher-inner (max 420px)
        • height:auto → conserve le ratio 16:9 (~0.545 × largeur)
        • max-width   → limite sur grands écrans (voir style.css .launcher-logo)
        • alt bilingue pour l'accessibilité
        • loading="eager" car c'est la ressource visuelle principale de l'écran 0
      -->
      <img
        class="launcher-logo"
        src="img/Logo-appli-or-fr.png"
        alt="Taphad'Meuh — vache tricolore parlant français et oromo / Taphad'Meuh — sa'a trikolore Faransaayii fi Oromoo dubbatu"
        width="1408"
        height="768"
        loading="eager"
        decoding="async"
      >
      <!-- Titre bilingue Français / Oromo -->
      <div class="launcher-title">
    Choisis ta langue <span class="launcher-title-translation">· Afaan kee filadhu</span>
</div>

      <!-- Cartes de sélection de langue -->
      <div class="launcher-cards">

        <!--
          Carte Français
          • lang-card--fr : variante colorée (voir style.css)
          • data-lang non utilisé ici ; le clic est géré par l'écouteur
            d'événements ajouté dans app.js (voir OPTIMISATION ci-dessous)
          OPTIMISATION : l'attribut onclick inline a été remplacé par un
          écouteur addEventListener dans app.js afin de séparer
          strictement le HTML (structure) du JS (comportement).
        -->
        <button class="lang-card lang-card--fr" data-lang="learn_french">
          <div class="lang-card-flag">🇫🇷</div>
          <div class="lang-card-body">
            <span class="lang-card-name">Apprendre le Français</span>
            <span class="lang-card-sub">Afaan Faransaayii Barachuu</span>
          </div>
          <div class="lang-card-arrow">›</div>
        </button>

        <!--
          Carte Oromo
          • lang-card--or : variante colorée (voir style.css)
        -->
        <button class="lang-card lang-card--or" data-lang="learn_oromo">
          <div class="lang-card-flag">🇪🇹</div>
          <div class="lang-card-body">
            <span class="lang-card-name">Afaan Oromoo Barachuu</span>
            <span class="lang-card-sub">Apprendre l'Oromo</span>
          </div>
          <div class="lang-card-arrow">›</div>
        </button>

      </div><!-- /.launcher-cards -->
    </div><!-- /.launcher-inner -->

    <!-- Pied de page propre à cet écran (classe spécifique pour le style) -->
    <footer class="launcher-footer">
      © Juin 2026 – Développé par Sébastien Godet · Assisté par IA Claude Sonnet 4.6 et Gemini 3.5 Flash<br>
      sebastien.godet16@gmail.com ·
      <a href="https://www.linkedin.com/in/s%C3%A9bastien-godet-142ba6145" target="_blank">LinkedIn</a> ·
      <!--
        showCredits() est défini dans app.js ; il affiche la modale
        #credits-modal en changeant son display de "none" à "flex".
        OPTIMISATION : onclick inline conservé ici car c'est un simple
        déclencheur de modale sans logique propre à la vue.
      -->
      <a href="#" onclick="showCredits()">Remerciements</a>
    </footer>

  </div><!-- /#app-launcher -->


  <!-- ════════════════════════════════════════════════════════════════
       ÉCRAN 1 — GUIDE / ONBOARDING  (#home)
       ────────────────────────────────────────────────────────────────
       Affiché après la sélection de langue (remplace l'ancien Home).
       Contenu injecté dynamiquement par app.js via _buildHomeGuide().
       Langue : Oromo si l'apprenant apprend le Français, et vice versa.
       Checkbox "Ne plus afficher" → flag localStorage par mode.
       ════════════════════════════════════════════════════════════════ -->
  <div id="home" class="screen">

    <!-- Barre fixe en haut : checkbox "Ne plus afficher" (gauche) + bouton Fermer (droite) -->
    <div class="home-topbar">
      <label class="topbar-noshow-label" id="homeTopbarNoshowLabel">
        <input type="checkbox" id="homeTopbarNoshowChk">
        <span id="homeTopbarNoshowText"></span>
      </label>
      <button class="home-close-btn" id="homeCloseBtn" aria-label="Fermer"></button>
    </div>

    <!-- En-tête coloré selon le mode -->
    <div class="home-guide-header" id="homeGuideHeader">
      <div class="home-guide-flags" id="homeGuideFlagsRow"></div>
      <h1 class="home-guide-title" id="homeTitle"></h1>
      <p class="home-guide-subtitle" id="homeGuideSubtitle"></p>

      <!-- Badges fonctionnalités -->
      <div class="home-guide-badges" id="homeGuideBadges"></div>

      <!--
        Cercle de progression global — rendu SVG par renderHome() dans app.js.
        Caché (display:none) quand progression = 0 (première visite).
        Visible dès qu'au moins 1 module est validé.
        L'id homeProgressCircle est requis par renderHome().
      -->
      <div class="home-progress-circle-wrap" id="homeProgressCircleWrap" style="display:none">
        <svg class="home-progress-circle" viewBox="0 0 120 120"
             width="120" height="120"
             role="img" aria-labelledby="hpcTitle" aria-describedby="hpcDesc">
          <title id="hpcTitle"></title>
          <desc id="hpcDesc"></desc>
          <!-- Piste de fond -->
          <circle class="hpc-track" cx="60" cy="60" r="50"/>
          <!-- Arc de progression — stroke-dashoffset animé par JS -->
          <circle class="hpc-fill"  cx="60" cy="60" r="50" id="hpcArc"/>
          <!-- Texte central : pourcentage -->
          <text class="hpc-pct"  x="60" y="56" id="hpcPct">0%</text>
          <!-- Texte central : étoiles -->
          <text class="hpc-sub"  x="60" y="74" id="hpcSub">⭐ 0</text>
        </svg>
        </div>
    </div><!-- /.home-guide-header -->
    <div class="home-guide-body" id="homeGuideBody"></div>

    <!-- Checkbox "Ne plus afficher" -->
    <div class="home-guide-noshow">
      <label class="noshow-label" id="homeNoshowLabel">
        <input type="checkbox" id="homeNoshowChk">
        <span id="homeNoshowText"></span>
      </label>
    </div>

    <!-- Bouton principal "Commencer" -->
    <div class="home-guide-cta">
      <button class="btn-primary" id="homeStartBtn"></button>
      <!--
        Bouton export PDF du guide — déclenche _exportGuide() dans app.js.
        Placé sous le bouton Commencer pour ne pas perturber le parcours principal.
        Le libellé est mis à jour dynamiquement par _buildHomeGuide() via id="homeExportBtn".
      -->
      <button class="btn-export-pdf" id="homeExportBtn" onclick="_exportGuide()">📄 Télécharger le guide</button>
    </div>

    <!--
      Footer de l'écran home — rempli dynamiquement par _setFooters() dans app.js.
      Contient : copyright bilingue, email, LinkedIn, Remerciements, Aide.
    -->
    <footer class="screen-footer" id="homeFooter"></footer>

  </div><!-- /#home -->


  <!-- ════════════════════════════════════════════════════════════════
       ÉCRAN 2a — NIVEAU 1 MODULES  (#sections-level1)
       ════════════════════════════════════════════════════════════════ -->
  <div id="sections-level1" class="screen">
    <div class="sections-header">
      <div class="sections-header-left">
        <h2 id="sectionsTitle"></h2>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="globalProgress" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
        <div class="sections-stars" id="sectionsStars"></div>
      </div>
      <div class="sections-flag" id="sectionsFlagRight"></div>
    </div>
    <div class="level-tab-bar">
      <button class="level-tab active" id="lvlTab1" onclick="showScreen('sections-level1')">
        <span id="level1Badge" class="level-badge"></span>
        <span id="level1Label"></span>
      </button>
      <button class="level-tab" id="lvlTab2" onclick="showScreen('sections-level2')">
        <span id="level2BadgeA" class="level-badge l2"></span>
        <span id="level2LabelA"></span>
      </button>
    </div>
    <div class="sections-body">
      <div class="themes-grid" id="grid1"></div>
    </div>
    <!--
      Footer de l'écran sections — rempli dynamiquement par _setFooters() dans app.js.
    -->
    <footer class="screen-footer" id="sectionsFooter"></footer>
  </div><!-- /#sections-level1 -->

  <!-- ════════════════════════════════════════════════════════════════
       ÉCRAN 2b — NIVEAU 2 MODULES  (#sections-level2)
       ════════════════════════════════════════════════════════════════ -->
  <div id="sections-level2" class="screen">
    <div class="sections-header">
      <div class="sections-header-left">
        <h2 id="sectionsTitle2"></h2>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="globalProgress2" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progressLabel2"></div>
        <div class="sections-stars" id="sectionsStars2"></div>
      </div>
      <div class="sections-flag" id="sectionsFlagRight2"></div>
    </div>
    <div class="level-tab-bar">
      <button class="level-tab" id="lvlTab1b" onclick="showScreen('sections-level1','back')">
        <span class="level-badge" id="level1BadgeB"></span>
        <span id="level1LabelB"></span>
      </button>
      <button class="level-tab active" id="lvlTab2b" onclick="showScreen('sections-level2')">
        <span class="level-badge l2" id="level2BadgeB"></span>
        <span id="level2LabelB"></span>
      </button>
    </div>
    <div class="sections-body">
      <div class="themes-grid" id="grid2"></div>
    </div>
  </div><!-- /#sections-level2 -->


  <!-- ════════════════════════════════════════════════════════════════
       ÉCRAN 3 — LEÇON  (#lesson)
       ────────────────────────────────────────────────────────────────
       Affiche le contenu d'un thème sélectionné.
       Structuré en onglets (#lessonTabs) dont le contenu (#tabContent)
       est entièrement généré par app.js selon le thème actif.
       ════════════════════════════════════════════════════════════════ -->
  <div id="lesson" class="screen">

    <div class="lesson-header">
      <!-- Retour vers la liste des sections -->
      <button class="back-btn" id="lessonBackBtn" onclick="lessonGoBack()">←</button>

      <!-- Badge niveau cliquable : "Niv. 1" ou "Niv. 2" -- renseigné par openTheme() -->
      <button class="lesson-level-badge" id="lessonLevelBadge" onclick="lessonGoBack()"></button>

      <span id="lessonEmoji"></span>
      <h3 id="lessonTitle"></h3>

      <!-- Navigation prev / next dans le niveau -->
      <div class="lesson-nav-arrows">
        <button class="lesson-nav-btn" id="lessonPrevBtn" onclick="lessonNav(-1)" title="Module précédent">‹</button>
        <button class="lesson-nav-btn" id="lessonNextBtn" onclick="lessonNav(1)"  title="Module suivant">›</button>
      </div>
    </div><!-- /.lesson-header -->

    <div class="lesson-body" id="lessonBody">
      <!--
        #lessonTabs   : barre d'onglets (Vocabulaire, Quiz, etc.)
                        générée par app.js
        #tabContent   : contenu de l'onglet actif, mis à jour par app.js
                        à chaque changement d'onglet
      -->
      <div class="tabs" id="lessonTabs"></div>
      <div id="tabContent" aria-live="polite" aria-atomic="false"></div>
    </div><!-- /.lesson-body -->

    <!--
      Barre d'export PDF — affichée sous le contenu de la leçon.
      • #lessonExportVocab  : visible uniquement sur les thèmes Niveau 1 (vocabulaire)
      • #lessonExportSit    : visible uniquement sur les thèmes Niveau 2 (dialogue)
      La visibilité est gérée par app.js via openTheme() :
        Niveau 1 → display:'flex' sur #lessonExportVocab, 'none' sur #lessonExportSit
        Niveau 2 → inverse
      Les deux boutons sont cachés par défaut (display:none) et seul le
      bon bouton est rendu visible selon le type du thème ouvert.
    -->
    <div class="lesson-export-bar">
      <button class="btn-export-pdf" id="lessonExportVocab"
              style="display:none"
              onclick="_exportVocab()">📄 Télécharger ce module</button>
      <button class="btn-export-pdf" id="lessonExportSit"
              style="display:none"
              onclick="_exportSituation()">📄 Télécharger cette situation</button>
    </div>

    <!--
      Pas de footer sur cet écran pour maximiser l'espace
      disponible sur mobile pendant l'apprentissage.
    -->

  </div><!-- /#lesson -->


  <!-- ════════════════════════════════════════════════════════════════
       MODALE — REMERCIEMENTS  (#credits-modal)
       ────────────────────────────────────────────────────────────────
       Fenêtre superposée, cachée par défaut (display:none).
       Ouverte par showCredits() (app.js) via display:"flex".
       Fermée par le bouton interne qui rappelle display:"none".
       OPTIMISATION : tous les styles inline (position, background,
       border-radius…) ont été déplacés dans style.css sous
       les sélecteurs .modal et .modal-content pour garder le HTML
       lisible et la mise en forme centralisée.
       ════════════════════════════════════════════════════════════════ -->
  <div id="credits-modal" class="modal">

    <div class="modal-content">

      <!--
        Contenu injecté dynamiquement par showCredits() dans app.js.
        Les IDs suivants sont requis pour le rendu bilingue :
          • credits-modal-title : titre ("Remerciements" / "Galateeffannaa")
          • credits-modal-body  : corps HTML bilingue (texte + liens)
          • credits-modal-close : libellé du bouton de fermeture ("Fermer" / "Cufuu")
      -->
      <h3 id="credits-modal-title"></h3>

      <div id="credits-modal-body"></div>

      <!-- Fermeture de la modale : remet display à "none" -->
      <button id="credits-modal-close"
              onclick="document.getElementById('credits-modal').style.display='none'">
      </button>

    </div><!-- /.modal-content -->

  </div><!-- /#credits-modal -->


  <!-- ════════════════════════════════════════════════════════════════
       BARRE DE NAVIGATION BASSE  (#bottom-nav)
       Cachée sur l'écran lanceur ; visible dès que l'app est initialisée.
       ════════════════════════════════════════════════════════════════ -->
  <nav id="bottom-nav" class="bottom-nav" aria-label="Navigation principale">
    <button class="nav-btn" id="navBtnModules" onclick="navGoModules()" aria-label="Modules">
      <span class="nav-icon">📚</span>
      <span class="nav-label" id="navLabelModules">Modules</span>
    </button>
    <button class="nav-btn" id="navBtnGuide" onclick="showOnboardingGuide()" aria-label="Guide">
      <span class="nav-icon">❓</span>
      <span class="nav-label" id="navLabelGuide">Guide</span>
    </button>
    <button class="nav-btn" id="navBtnLang" onclick="showScreen('app-launcher','back')" aria-label="Changer de langue">
      <span class="nav-icon" id="navLangFlag">🌐</span>
      <span class="nav-label" id="navLabelLang">Langue</span>
    </button>
    <button class="nav-btn" id="navBtnCredits" onclick="showCredits()" aria-label="Remerciements">
      <span class="nav-icon">💌</span>
      <span class="nav-label" id="navLabelCredits">Merci</span>
    </button>
  </nav>

</div><!-- /.app -->


<!--
  ══════════════════════════════════════════════════════════════════
  CHARGEMENT DES SCRIPTS
  ══════════════════════════════════════════════════════════════════
  Les scripts sont placés en fin de <body> pour s'assurer que
  l'intégralité du DOM est parsé avant leur exécution.

  ARCHITECTURE DE CHARGEMENT (depuis Juin 2026) :
    1. app.js   — moteur applicatif. Contient _loadDataScript(),
                  qui injecte dynamiquement le bon fichier de
                  données au moment du choix de langue :
                    • learn_french → js/data-fr.js  (~1 350 lignes)
                    • learn_oromo  → js/data-or.js  (~1 350 lignes)

  AVANTAGE : seul le dataset du mode choisi est chargé en mémoire
  (~50% de mémoire JS par mode vs un fichier monolithique unique).
  data-fr.js et data-or.js sont pré-cachés dès l'installation par
  le Service Worker pour garantir le fonctionnement hors-ligne.
  ══════════════════════════════════════════════════════════════════
-->
<script src="js/app.js"></script>

</body>
</html>
